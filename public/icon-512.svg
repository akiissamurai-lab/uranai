<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <linearGradient id="accentSub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="60%" r="50%">
      <stop offset="0%" stop-color="rgba(74,222,128,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Subtle glow -->
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- Circular progress track (background) -->
  <circle cx="256" cy="268" r="148" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="28"/>

  <!-- Circular progress arc (~75%) -->
  <circle cx="256" cy="268" r="148" fill="none" stroke="url(#accent)" stroke-width="28"
    stroke-linecap="round" stroke-dasharray="698" stroke-dashoffset="175"
    transform="rotate(-90 256 268)"/>

  <!-- Inner ring glow -->
  <circle cx="256" cy="268" r="148" fill="none" stroke="url(#accentSub)" stroke-width="48"
    stroke-dasharray="698" stroke-dashoffset="175"
    transform="rotate(-90 256 268)" opacity="0.3"/>

  <!-- Center bolt symbol (energy/transformation) -->
  <path d="M 272 195 L 232 272 L 268 272 L 240 348"
    fill="none" stroke="url(#accent)" stroke-width="22"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small sparkle dots -->
  <circle cx="370" cy="160" r="4" fill="#4ade80" opacity="0.6"/>
  <circle cx="390" cy="185" r="2.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="145" cy="370" r="3" fill="#a78bfa" opacity="0.4"/>
</svg>
